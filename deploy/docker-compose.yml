# Linen Draper - Anubis Proof-of-Work Filter
#
# Anubis sits between Caddy and the Reflex frontend.
# It requires a proof-of-work challenge before serving pages to unauthenticated clients.
# API/WebSocket paths bypass Anubis entirely (they use Reflex's own authentication).
#
# Image: ghcr.io/techarohq/anubis (TecharoHQ fork)
# Docs:  https://anubis.techaro.lol
#
# Start manually:
#   docker compose -f deploy/docker-compose.yml up -d
#
# Or use the install.sh script which handles this automatically.

services:
  anubis:
    image: ghcr.io/techarohq/anubis:main
    container_name: anubis
    restart: unless-stopped
    network_mode: host
    environment:
      # Bind: port Anubis listens on (Caddy reverse proxies to this)
      BIND: ":8080"
      # Target: Reflex production (serves frontend + backend on single port)
      TARGET: "http://localhost:3000"
      # Difficulty: proof-of-work challenge complexity
      # Range: 0 (easy) to 10000 (hard), default is 4
      DIFFICULTY: "4"
      # Cookie: mark the Anubis token as secure (HTTPS only)
      COOKIE_SECURE: "true"
      # Bare metal: read client IP from network (needed without Docker proxy)
      USE_REMOTE_ADDRESS: "true"
      # Optional: metrics endpoint
      # METRICS_BIND: ":9090"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
